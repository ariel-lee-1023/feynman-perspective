name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          python3 - <<'PY'
          import re, sys

          text = open("SKILL.md", encoding="utf-8").read()
          m = re.match(r"^---\n(.*?)\n---\n", text, re.S)
          if not m:
              sys.exit("FAIL: SKILL.md has no YAML frontmatter block")

          fm = m.group(1)
          errors = []

          name = re.search(r"^name:\s*(\S+)", fm, re.M)
          if not name:
              errors.append("frontmatter is missing a 'name' field")
          elif not re.fullmatch(r"[a-z0-9]+(-[a-z0-9]+)*", name.group(1)):
              errors.append(f"'name' must be lowercase-hyphenated, got {name.group(1)!r}")
          elif name.group(1) != "feynman-perspective":
              errors.append("'name' must match the skill directory name")

          if not re.search(r"^description:", fm, re.M):
              errors.append("frontmatter is missing a 'description' field")

          body = text[m.end():]
          desc = fm.split("description:", 1)[-1]
          if len(desc.split()) < 15:
              errors.append("description is too thin for reliable triggering")
          if len(body.split()) < 200:
              errors.append("SKILL.md body is suspiciously short")

          if errors:
              sys.exit("FAIL:\n  - " + "\n  - ".join(errors))
          print("OK: frontmatter valid")
          PY

      - name: Validate JSON files
        run: |
          python3 - <<'PY'
          import json, pathlib, sys

          bad = []
          files = sorted(pathlib.Path(".").rglob("*.json"))
          if not files:
              sys.exit("FAIL: no JSON files found")
          for p in files:
              try:
                  json.loads(p.read_text(encoding="utf-8"))
                  print(f"OK: {p}")
              except Exception as e:
                  bad.append(f"{p}: {e}")
          if bad:
              sys.exit("FAIL:\n  - " + "\n  - ".join(bad))
          PY

      - name: Check reference paths resolve
        run: |
          python3 - <<'PY'
          import re, pathlib, sys

          text = open("SKILL.md", encoding="utf-8").read()
          missing = []
          for ref in re.findall(r"`(references/[^`]+)`", text):
              if not pathlib.Path(ref).exists():
                  missing.append(ref)
          if missing:
              sys.exit("FAIL: SKILL.md points at files that do not exist:\n  - "
                       + "\n  - ".join(missing))
          print("OK: all reference paths resolve")
          PY

      - name: Guard against committing the source corpus
        run: |
          if [ -d raw ] || [ -d corpus ]; then
            echo "FAIL: a raw corpus directory is tracked; source works must not be committed"
            exit 1
          fi
          echo "OK: no corpus directory tracked"
